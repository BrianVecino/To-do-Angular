<div class="container-main">

    <div class="header">
        <h1><i class="fas fa-check-circle"></i>To-Do-List</h1>
        <p>Mantenete Organizado y Productivo</p>
    </div>

    <div class="card-container">

        <div class="card-header-custom">
            <h5><i class="fas fa-plus"></i> Agregar Nueva Tarea</h5>
        </div>

        <div class="add-todo-section">
            <div class="input-group-custom">
                <input type="text" [(ngModel)]="newTask.todoItem" class="form-control-custom"
                    placeholder="Que necesitas hacer?">

                <button class="btn-add" (click)="onSaveNewTask()">
                    <i class="fas fa-plus"></i> Guardar
                </button>
            </div>
        </div>

        <div class="controls-section">

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar Tareas ..." #search (input)="searchText.set(search.value)">
            </div>

            <select class="sort-dropdown" [ngModel]="sortMode()" (ngModelChange)="sortMode.set($event)">
                <option value="date-desc">Reciente</option>
                <option value="date-asc">Antigua</option>
            </select>

        </div>

        <div class="todos-list">
            @for (item of filteredTodos(); track item.todoItemId) {
            <div class="todo-item">

                <input type="checkbox" class="checkbox-custom" [checked]="item.status === 'Done'"
                    (change)="toggleStatus(item)">

                <div class="todo-content">
                    <div class="todo-text">{{item.todoItem}}</div>
                    <div class="todo-meta">
                        <span class="todo-priority" [ngClass]="item.status">
                            <i [ngClass]="{
                            'fas fa-hourglass-half': item.status === 'Pending',
                            'fa-solid fa-check': item.status === 'Done'
                            }"></i> {{item.status}}
                        </span>
                        <span class="todo-date">
                            <i class="fa-solid fa-calendar-days fa-xl"></i>
                            {{ item.createdDate | date:'dd-MMM-yyyy' }}
                        </span>
                    </div>
                </div>

                <div class="todo-actions">
                    <button class="btn-action btn-delete" (click)="deleteTask(item)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>

            </div>
            }
        </div>
    </div>
</div>
